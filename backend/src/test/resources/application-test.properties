# H2 In-Memory Database for testing — no MySQL needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Disable HikariCP pool size warnings in tests
spring.datasource.hikari.maximum-pool-size=5

# JWT
jwt.secret=test_secret_key_at_least_32_chars_long_for_hs256
jwt.expiration-ms=3600000

# OTP
auth.otp.expiration-minutes=5

# Resend — disabled in tests
resend.api.key=re_test_dummy_key
resend.from-email=test@test.com

# Seed — disabled in tests
app.seed.admin.enabled=false
app.seed.admin.name=
app.seed.admin.email=
app.seed.admin.password=

# Suppress unnecessary logs
logging.level.root=WARN
logging.level.com.vnet=INFO
