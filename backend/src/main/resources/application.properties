spring.datasource.url=jdbc:mysql://localhost:3306/vnet_db_new?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&rewriteBatchedStatements=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=VNetPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate Optimization
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.open-in-view=false

server.port=8080

# Logging
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN


# JWT
jwt.secret=${JWT_SECRET:vnet_dev_only_secret_key_change_this_before_production_2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}


# Optional bootstrap admin seeding
app.seed.admin.enabled=${SEED_ADMIN_ENABLED:true}
app.seed.admin.name=${SEED_ADMIN_NAME:Super Admin VNet}
app.seed.admin.email=${SEED_ADMIN_EMAIL:admin@victorynetwork.id}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:admin123}

# Tomcat & Multipart Limits
server.tomcat.max-http-form-post-size=100MB
server.tomcat.max-swallow-size=100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Jackson Parser Limits
spring.jackson.parser.max-string-length=100000000
